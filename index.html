<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What We Watch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 380px;
    }

    /* Header */
    .header {
      margin-bottom: 48px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.4px;
      color: #fff;
    }
    .header p {
      font-size: 13px;
      color: #555;
      margin-top: 4px;
      font-weight: 400;
    }

    /* Fields */
    .field { margin-bottom: 12px; }

    label {
      display: block;
      font-size: 11px;
      color: #444;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input[type=text], input[type=url] {
      width: 100%;
      padding: 13px 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid #222;
      color: #fff;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      outline: none;
      transition: border-color 0.2s;
      border-radius: 0;
    }
    input:focus { border-bottom-color: #fff; }
    input::placeholder { color: #333; }

    .fetched-title {
      font-size: 12px;
      color: #555;
      margin-top: 8px;
      min-height: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 32px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 0;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn:hover:not(:disabled) { background: #e0e0e0; }
    .btn:active:not(:disabled) { background: #bbb; }
    .btn:disabled { background: #111; color: #333; cursor: default; }

    /* Status */
    #status {
      margin-top: 16px;
      font-size: 13px;
      min-height: 20px;
      line-height: 1.5;
    }
    .ok  { color: #fff; }
    .err { color: #666; }
    .inf { color: #444; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 36px 0 24px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px;
      background: #1a1a1a;
    }
    .divider span { font-size: 11px; color: #333; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.05em; }

    /* Edit section */
    #edit-section { display: none; }
    #edit-section .warn {
      font-size: 12px;
      color: #555;
      margin-bottom: 20px;
    }
    .row { display: flex; gap: 16px; }
    .row .field:first-child { flex: 1; }
    .row .field:last-child  { flex: 0 0 80px; }

    #edit-status { margin-top: 12px; font-size: 13px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="header">
      <h1>What We Watch</h1>
      <p>Отправить трейлер в Telegram</p>
    </div>

    <div id="main-section">
      <div class="field">
        <label>Ссылка на трейлер</label>
        <input type="url" id="urlInput" placeholder="youtube.com/watch?v=..." />
        <div class="fetched-title" id="fetchedTitle"></div>
      </div>
      <button class="btn" id="sendBtn">Отправить</button>
      <div id="status"></div>
    </div>

    <div id="edit-section">
      <div class="divider"><span>Уточни название</span></div>
      <div class="warn" id="edit-warn"></div>
      <div class="row">
        <div class="field">
          <label>Название фильма</label>
          <input type="text" id="titleInput" placeholder="Sinners" />
        </div>
        <div class="field">
          <label>Год</label>
          <input type="text" id="yearInput" placeholder="2025" maxlength="4" />
        </div>
      </div>
      <button class="btn" id="retryBtn">Найти и отправить</button>
      <div id="edit-status"></div>
    </div>

  </div>

  <script>
  const BACKEND = 'https://what-we-watch-six.vercel.app';

  const sendBtn        = document.getElementById('sendBtn');
  const retryBtn       = document.getElementById('retryBtn');
  const urlInput       = document.getElementById('urlInput');
  const titleInput     = document.getElementById('titleInput');
  const yearInput      = document.getElementById('yearInput');
  const statusEl       = document.getElementById('status');
  const editSec        = document.getElementById('edit-section');
  const editWarn       = document.getElementById('edit-warn');
  const editStatus     = document.getElementById('edit-status');
  const fetchedTitleEl = document.getElementById('fetchedTitle');

  function extractMovieTitle(videoTitle) {
    const seps = [' — ', ' – ', ' - ', ' | '];
    for (const sep of seps) {
      const idx = videoTitle.indexOf(sep);
      if (idx > 0) return videoTitle.slice(0, idx).trim();
    }
    return videoTitle.trim();
  }

  async function fetchYouTubeTitle(url) {
    try {
      const r = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`);
      if (!r.ok) return null;
      const d = await r.json();
      return d.title || null;
    } catch (e) { return null; }
  }

  let oembedTimer = null;
  urlInput.addEventListener('input', () => {
    const url = urlInput.value.trim();
    fetchedTitleEl.textContent = '';
    clearTimeout(oembedTimer);
    if (!url.includes('youtube') && !url.includes('youtu.be')) return;
    oembedTimer = setTimeout(async () => {
      fetchedTitleEl.textContent = '...';
      const videoTitle = await fetchYouTubeTitle(url);
      fetchedTitleEl.textContent = videoTitle ? extractMovieTitle(videoTitle) : '';
    }, 600);
  });

  async function apiFetch(path, body) {
    const res = await fetch(BACKEND + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return res.json();
  }

  async function doSend(movie) {
    const res = await apiFetch('/api/share-trailer', movie);
    if (!res.ok) throw new Error(res.error || 'send error');
  }

  function setStatus(el, msg, cls) {
    el.innerHTML = cls ? `<span class="${cls}">${msg}</span>` : '';
  }

  function showEdit(warn, prefillTitle, prefillYear) {
    editWarn.textContent = warn;
    editStatus.innerHTML = '';
    if (prefillTitle) titleInput.value = prefillTitle;
    if (prefillYear)  yearInput.value  = prefillYear;
    retryBtn.disabled = false;
    retryBtn.textContent = 'Найти и отправить';
    editSec.style.display = 'block';
  }

  sendBtn.addEventListener('click', async () => {
    const url = urlInput.value.trim();
    if (!url) { setStatus(statusEl, '— вставь ссылку', 'err'); return; }

    sendBtn.disabled = true;
    editSec.style.display = 'none';
    fetchedTitleEl.textContent = '';
    setStatus(statusEl, 'читаю название...', 'inf');

    const videoTitle = await fetchYouTubeTitle(url);
    if (!videoTitle) {
      setStatus(statusEl, '', '');
      showEdit('— не удалось прочитать название, введи вручную', '', '');
      sendBtn.disabled = false;
      return;
    }

    const movieTitle = extractMovieTitle(videoTitle);
    const yearMatch = videoTitle.match(/\b(19|20)\d{2}\b/);
    const suggestedYear = yearMatch ? yearMatch[0] : '';

    setStatus(statusEl, `ищу «${movieTitle}»...`, 'inf');
    try {
      const preview = await apiFetch('/api/preview-trailer', { title: movieTitle });

      if (!preview.ok) {
        setStatus(statusEl, '', '');
        showEdit(`— «${movieTitle}» не найдено`, preview.suggestedTitle || movieTitle, preview.suggestedYear || suggestedYear);
        sendBtn.disabled = false;
        return;
      }

      setStatus(statusEl, 'отправляю...', 'inf');
      await doSend(preview.movie);
      setStatus(statusEl, '✓ отправлено', 'ok');
      urlInput.value = '';
    } catch (e) {
      setStatus(statusEl, '— ошибка сети', 'err');
    }
    sendBtn.disabled = false;
  });

  retryBtn.addEventListener('click', async () => {
    const title = titleInput.value.trim();
    const year  = yearInput.value.trim();
    if (!title) { setStatus(editStatus, '— введи название', 'err'); return; }

    retryBtn.disabled = true;
    setStatus(editStatus, 'ищу...', 'inf');
    editWarn.textContent = '';

    try {
      const query = year ? `${title} (${year})` : title;
      const preview = await apiFetch('/api/preview-trailer', { title: query });

      if (!preview.ok) {
        editWarn.textContent = '— не найдено, попробуй другое название';
        setStatus(editStatus, '', '');
        retryBtn.disabled = false;
        return;
      }

      setStatus(editStatus, 'отправляю...', 'inf');
      await doSend(preview.movie);
      setStatus(editStatus, '✓ отправлено', 'ok');
      retryBtn.textContent = '✓ отправлено';
    } catch (e) {
      setStatus(editStatus, '— ошибка сети', 'err');
      retryBtn.disabled = false;
    }
  });
  </script>
</body>
</html>
